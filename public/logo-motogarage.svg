<svg viewBox="0 0 160 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MotoGarage">
  <defs>
    <linearGradient id="mg-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#cccccc"/>
      <stop offset="70%" stop-color="#777777"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="mg-body" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="mg-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ee1111"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </linearGradient>
    <linearGradient id="mg-silver-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#aaaaaa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#444444" stop-opacity="0"/>
    </linearGradient>
    <filter id="mg-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ombra esterna -->
  <path d="M80 6 C46 6, 15 38, 15 80 L15 130 C15 155, 50 170, 80 172 C110 170, 145 155, 145 130 L145 80 C145 38, 114 6, 80 6 Z"
    fill="#000" opacity="0.3" transform="translate(3,5)"/>

  <!-- Corpo casco principale -->
  <path d="M80 4 C46 4, 14 36, 14 78 L14 128 C14 153, 50 168, 80 170 C110 168, 146 153, 146 128 L146 78 C146 36, 114 4, 80 4 Z"
    fill="url(#mg-body)" filter="url(#mg-shadow)"/>

  <!-- Riflessione luce sinistra (highlight) -->
  <path d="M26 50 C20 60, 17 72, 17 84 L17 90 C17 82, 20 62, 30 48 Z" fill="#fff" opacity="0.08"/>

  <!-- Striscia cromata verticale centrale (top) -->
  <path d="M73 4 C75 3, 77 2, 80 2 C83 2, 85 3, 87 4 L91 80 L80 77 L69 80 Z" fill="url(#mg-chrome)"/>

  <!-- Accento cromato lato sinistro -->
  <path d="M14 88 C12 90, 12 96, 14 98 L18 102 L20 94 C18 92, 16 90, 14 88 Z" fill="#aaa" opacity="0.5"/>
  <!-- Accento cromato lato destro -->
  <path d="M146 88 C148 90, 148 96, 146 98 L142 102 L140 94 C142 92, 144 90, 146 88 Z" fill="#aaa" opacity="0.5"/>

  <!-- Zona visiera (base scura) -->
  <path d="M22 102 L138 102 L138 145 C138 149, 128 152, 118 152 L42 152 C32 152, 22 149, 22 145 Z" fill="#060606"/>

  <!-- Bordo superiore visiera (cromato) -->
  <rect x="22" y="100" width="116" height="3" rx="1" fill="#999" opacity="0.7"/>

  <!-- M ROSSA – forma visiera a M -->
  <path d="M28 148 L40 106 L60 130 L80 104 L100 130 L120 106 L132 148 Z" fill="url(#mg-red)"/>
  <!-- Ombra interna sulla M per profondità -->
  <path d="M34 148 L44 112 L62 133 L80 110 L98 133 L116 112 L126 148 Z" fill="#990000" opacity="0.5"/>
  <!-- Luci interne M (riflessi) -->
  <path d="M80 104 L92 118 L80 114 L68 118 Z" fill="#ff4444" opacity="0.4"/>

  <!-- Bordo inferiore visiera -->
  <rect x="22" y="148" width="116" height="3" rx="1" fill="#555" opacity="0.6"/>

  <!-- Griglie mento -->
  <rect x="62" y="158" width="36" height="7" rx="3.5" fill="#111"/>
  <rect x="65" y="160" width="7" height="3" rx="1.5" fill="#2a2a2a"/>
  <rect x="76" y="160" width="7" height="3" rx="1.5" fill="#2a2a2a"/>
  <rect x="87" y="160" width="7" height="3" rx="1.5" fill="#2a2a2a"/>
</svg>
