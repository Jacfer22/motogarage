<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      filter: drop-shadow(0 6px 20px rgba(239, 27, 36, 0.35));
    }
    h1 {
      margin-top: 1.35rem;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #fff;
      text-align: center;
    }
  </style>
</head>
<body>
  <img class="logo" src="/logo-motogarage.png" alt="MotoGarage" />
  <h1>Moto Garage</h1>
</body>
</html>
