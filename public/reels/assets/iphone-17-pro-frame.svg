<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1920" viewBox="0 0 1000 1920">
  <defs>
    <linearGradient id="titanium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7a7a7e"/>
      <stop offset="22%" stop-color="#b8b8bc"/>
      <stop offset="48%" stop-color="#5c5c60"/>
      <stop offset="72%" stop-color="#98989c"/>
      <stop offset="100%" stop-color="#6a6a6e"/>
    </linearGradient>
    <linearGradient id="edge-shine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="12%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="88%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="inner-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.35"/>
    </linearGradient>
    <mask id="bezel-mask">
      <rect width="1000" height="1920" fill="white"/>
      <rect x="22" y="22" width="956" height="1876" rx="88" ry="88" fill="black"/>
    </mask>
    <filter id="soft-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Device shadow -->
  <rect x="30" y="30" width="940" height="1860" rx="104" ry="104" fill="#000000" opacity="0.35" filter="url(#soft-shadow)"/>

  <!-- Titanium chassis (bezel ring with transparent screen hole) -->
  <rect width="1000" height="1920" rx="108" ry="108" fill="url(#titanium)" mask="url(#bezel-mask)"/>

  <!-- Edge highlight -->
  <rect width="1000" height="1920" rx="108" ry="108" fill="url(#edge-shine)" mask="url(#bezel-mask)" opacity="0.7"/>

  <!-- Inner bezel lip -->
  <rect x="22" y="22" width="956" height="1876" rx="88" ry="88" fill="none" stroke="#1a1a1c" stroke-width="3"/>
  <rect x="24" y="24" width="952" height="1872" rx="86" ry="86" fill="none" stroke="url(#inner-glow)" stroke-width="2"/>

  <!-- Dynamic Island -->
  <rect x="362" y="38" width="276" height="38" rx="19" ry="19" fill="#050505"/>
  <rect x="362" y="38" width="276" height="38" rx="19" ry="19" fill="none" stroke="#2a2a2e" stroke-width="1"/>
  <!-- Camera dot -->
  <circle cx="610" cy="57" r="6" fill="#1a1a22"/>
  <circle cx="610" cy="57" r="3" fill="#0d2a4a"/>

  <!-- Action button (left) -->
  <rect x="-2" y="340" width="6" height="52" rx="2" fill="#6e6e72"/>
  <!-- Volume up -->
  <rect x="-2" y="430" width="6" height="78" rx="2" fill="#6e6e72"/>
  <!-- Volume down -->
  <rect x="-2" y="530" width="6" height="78" rx="2" fill="#6e6e72"/>
  <!-- Power button (right) -->
  <rect x="996" y="460" width="6" height="110" rx="2" fill="#6e6e72"/>

  <!-- Antenna lines -->
  <rect x="80" y="0" width="840" height="2" fill="#555558" opacity="0.4"/>
  <rect x="80" y="1918" width="840" height="2" fill="#555558" opacity="0.4"/>
</svg>
