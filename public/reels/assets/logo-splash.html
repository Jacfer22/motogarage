<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: radial-gradient(circle at 50% 28%, #1a0508 0%, #07080a 55%, #050608 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #f0f1f2;
      padding: 2rem;
    }
    .logo {
      width: 88px;
      height: 88px;
      object-fit: contain;
      filter: drop-shadow(0 8px 24px rgba(209,25,25,0.45));
    }
    h1 {
      margin-top: 1.25rem;
      font-family: 'Fraunces', Georgia, serif;
      font-size: 2.15rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-transform: none;
      text-align: center;
      line-height: 1.12;
    }
    .pill {
      margin-top: 0.85rem;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: rgba(240, 241, 242, 0.82);
      text-align: center;
    }
    .tag {
      margin-top: 1.75rem;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: 0;
      color: rgba(240, 241, 242, 0.72);
      text-align: center;
      max-width: 17rem;
    }
    .tag em {
      font-style: normal;
      color: #e85c5c;
    }
  </style>
</head>
<body>
  <img class="logo" src="/logo-motogarage.png" alt="MotoGarage" />
  <h1>MotoGarage</h1>
  <p class="pill">Traccia, naviga, condividi</p>
  <p class="tag">Il modello 3D della tua moto, <em>sempre con te</em></p>
</body>
</html>
